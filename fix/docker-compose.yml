services:
  db:
    image: postgres:16-alpine
    container_name: onyx-db
    environment:
      POSTGRES_DB: onyx
      POSTGRES_USER: onyx
      POSTGRES_PASSWORD: onyx
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - onyx_db_data:/var/lib/postgresql/data
    ports:
      # Use 5433 on host if a local PostgreSQL already binds 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onyx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onyx-api
    environment:
      DATABASE_URL: postgresql://onyx:onyx@db:5432/onyx
      ENV: production
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://frontend:3000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - onyx-network
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onyx-frontend
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://api:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - onyx-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  onyx_db_data:

networks:
  onyx-network:
    driver: bridge
