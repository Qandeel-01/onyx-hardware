version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: onyx-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-onyx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-onyx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-onyx}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

  backend:
    build:
      context: ./backend
      target: prod
    container_name: onyx-backend-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-onyx}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-onyx}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
    volumes:
      - yolo-models:/app/models
      - uploads:/app/uploads
    networks:
      - onyx-network
    restart: always

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost}
    container_name: onyx-frontend-prod
    networks:
      - onyx-network
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: onyx-nginx-prod
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/onyx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - onyx-network
    restart: always

volumes:
  pgdata:
  yolo-models:
  uploads:

networks:
  onyx-network:
    driver: bridge
