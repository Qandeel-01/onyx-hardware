# Stack: Postgres + FastAPI only. Run the UI on the host: `cd frontend && npm run dev`
# (avoids a second Vite + conflicting VITE_* env inside a container).
# If port 5173 still serves HTML from an old frontend container, remove it, then:
#   docker rm -f onyx-frontend
#   docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: onyx-db
    environment:
      POSTGRES_DB: onyx
      POSTGRES_USER: onyx
      POSTGRES_PASSWORD: onyx
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - onyx_db_data:/var/lib/postgresql/data
    ports:
      # Use 5433 on host if a local PostgreSQL already binds 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onyx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onyx-api
    environment:
      DATABASE_URL: postgresql://onyx:onyx@db:5432/onyx
      ENV: production
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - onyx-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Tables are created by app.main Base.metadata.create_all; alembic.ini in repo is incomplete for `alembic upgrade`.
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  onyx_db_data:

networks:
  onyx-network:
    driver: bridge