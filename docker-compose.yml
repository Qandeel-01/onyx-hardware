version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: onyx-postgres
    environment:
      POSTGRES_USER: onyx
      POSTGRES_PASSWORD: onyx
      POSTGRES_DB: onyx
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onyx -d onyx"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

  influxdb:
    image: influxdb:2.7
    container_name: onyx-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: onyx
      DOCKER_INFLUXDB_INIT_PASSWORD: onyxpassword
      DOCKER_INFLUXDB_INIT_ORG: onyx
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: onyx-super-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

  redis:
    image: redis:7-alpine
    container_name: onyx-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onyx-backend
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://onyx:onyx@postgres:5432/onyx
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: onyx-super-secret-token
      INFLUXDB_ORG: onyx
      INFLUXDB_BUCKET: sensor_data
      REDIS_URL: redis://redis:6379
      SHOT_CONFIDENCE_MIN: "0.5"
      MAX_WS_CLIENTS: "50"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onyx-network

volumes:
  pgdata:
  influxdb-data:
  redis-data:

networks:
  onyx-network:
    driver: bridge
